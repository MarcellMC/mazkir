services:
  loki:
    image: grafana/loki:3.5.0
    container_name: mazkir-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  alloy:
    image: grafana/alloy:v1.6.1
    container_name: mazkir-alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
      # Tail mazkir's log dir read-only.
      - ${MAZKIR_LOGS_DIR:-../../data/logs}:/var/log/mazkir:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    container_name: mazkir-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:15.10.0
    container_name: mazkir-phoenix
    ports:
      - "6006:6006"   # UI + OTLP/HTTP ingress
      - "4317:4317"   # OTLP/gRPC (unused by us but Phoenix exposes it)
    environment:
      PHOENIX_WORKING_DIR: /phoenix
      PHOENIX_PORT: "6006"
    volumes:
      - phoenix-data:/phoenix
    restart: unless-stopped

volumes:
  loki-data:
  alloy-data:
  grafana-data:
  phoenix-data:
